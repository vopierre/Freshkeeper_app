    <!-- Service Worker Registration -->
    <script>
      // Activer le Service Worker en production, désactiver en développement local
      if ('serviceWorker' in navigator) {
        const isLocalhost = location.hostname === 'localhost' || location.hostname === '127.0.0.1'

        if (!isLocalhost) {
          // Production - Enregistrer le Service Worker
          window.addEventListener('load', () => {
            navigator.serviceWorker.register('/Freshkeeper_App/sw.js')
              .then((registration) => {
                console.log('Service Worker registered:', registration.scope)
              })
              .catch((error) => {
                console.log('Service Worker registration failed:', error)
              })
          })
        } else {
          // Développement - Désenregistrer le Service Worker
          navigator.serviceWorker.getRegistrations().then((registrations) => {
            for (let registration of registrations) {
              registration.unregister()
              console.log('Service Worker unregistered in development mode')
            }
          })
        }
      }
    </script>
