<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test DeepL API</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      background: white;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 { color: #2c3e50; margin-top: 0; }
    input, textarea {
      width: 100%;
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
      margin-bottom: 12px;
      font-family: inherit;
    }
    button {
      background: linear-gradient(135deg, #3498db, #2980b9);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-right: 8px;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .result {
      background: #e8f4f8;
      padding: 16px;
      border-radius: 8px;
      margin-top: 16px;
      border-left: 4px solid #3498db;
    }
    .error {
      background: #fee;
      color: #c33;
      padding: 12px;
      border-radius: 6px;
      border: 2px solid #fcc;
      margin-top: 12px;
    }
    .success {
      background: #efe;
      color: #363;
      padding: 12px;
      border-radius: 6px;
      border: 2px solid #cfc;
      margin-top: 12px;
    }
    .comparison {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 16px;
    }
    .comparison-item {
      padding: 12px;
      border-radius: 8px;
      border: 2px solid #ddd;
    }
    .comparison-item h3 {
      margin-top: 0;
      color: #555;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌐 Test DeepL API</h1>
    <p>Testez la traduction DeepL pour vos recettes</p>

    <label><strong>Clé API DeepL :</strong></label>
    <input type="text" id="apiKey" placeholder="Entrez votre clé DeepL (format: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx:fx)" />
    <small style="color: #666;">
      Obtenez votre clé gratuite sur :
      <a href="https://www.deepl.com/pro-api" target="_blank">https://www.deepl.com/pro-api</a>
    </small>

    <div style="margin-top: 24px;">
      <label><strong>Texte à traduire (anglais → français) :</strong></label>
      <textarea id="textToTranslate" rows="4" placeholder="Ex: Grilled Chicken with Tomatoes and Fresh Basil">Grilled Chicken with Tomatoes and Fresh Basil</textarea>
    </div>

    <button onclick="testDeepL()">🔄 Traduire avec DeepL</button>
    <button onclick="testComparison()">📊 Comparer DeepL vs LibreTranslate</button>

    <div id="result"></div>
  </div>

  <div class="container">
    <h2>📋 Exemples de titres de recettes</h2>
    <p>Cliquez pour tester rapidement :</p>
    <button onclick="quickTest('Grilled Chicken with Tomatoes')">Poulet grillé</button>
    <button onclick="quickTest('Easy Tomato Soup')">Soupe tomate</button>
    <button onclick="quickTest('Baked Salmon with Lemon and Herbs')">Saumon au four</button>
    <button onclick="quickTest('Creamy Mushroom Risotto')">Risotto</button>
  </div>

  <script>
    function getApiKey() {
      const key = document.getElementById('apiKey').value.trim()
      if (!key) {
        alert('Veuillez entrer votre clé API DeepL')
        return null
      }
      return key
    }

    async function translateWithDeepL(text, apiKey) {
      const response = await fetch('https://api-free.deepl.com/v2/translate', {
        method: 'POST',
        headers: {
          'Authorization': `DeepL-Auth-Key ${apiKey}`,
          'Content-Type': 'application/x-www-form-urlencoded',
        },
        body: new URLSearchParams({
          text: text,
          source_lang: 'EN',
          target_lang: 'FR',
        })
      })

      if (!response.ok) {
        const errorData = await response.json().catch(() => ({}))
        throw new Error(`DeepL API error: ${response.status} - ${JSON.stringify(errorData)}`)
      }

      const data = await response.json()

      if (data.translations && data.translations.length > 0) {
        return data.translations[0].text
      }

      throw new Error('No translation returned')
    }

    async function translateWithLibreTranslate(text) {
      const response = await fetch('https://libretranslate.com/translate', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          q: text,
          source: 'en',
          target: 'fr',
          format: 'text'
        })
      })

      if (!response.ok) {
        throw new Error('LibreTranslate API error')
      }

      const data = await response.json()
      return data.translatedText || text
    }

    async function testDeepL() {
      const apiKey = getApiKey()
      if (!apiKey) return

      const text = document.getElementById('textToTranslate').value
      const result = document.getElementById('result')

      if (!text) {
        result.innerHTML = '<div class="error">Veuillez entrer un texte à traduire</div>'
        return
      }

      result.innerHTML = '<p>⏳ Traduction en cours...</p>'

      try {
        const startTime = performance.now()
        const translated = await translateWithDeepL(text, apiKey)
        const duration = Math.round(performance.now() - startTime)

        result.innerHTML = `
          <div class="success">✅ Traduction réussie !</div>
          <div class="result">
            <div><strong>Original (EN) :</strong></div>
            <div style="margin: 8px 0; font-size: 18px;">${text}</div>
            <div style="margin-top: 16px;"><strong>Traduction (FR) :</strong></div>
            <div style="margin: 8px 0; font-size: 18px; color: #3498db; font-weight: bold;">${translated}</div>
            <div style="margin-top: 12px; color: #666; font-size: 14px;">⏱️ Temps : ${duration}ms</div>
          </div>
        `
      } catch (error) {
        result.innerHTML = `
          <div class="error">
            <strong>❌ Erreur</strong><br>
            ${error.message}
            <div style="margin-top: 8px; font-size: 14px;">
              Vérifiez :
              <ul style="margin: 4px 0; padding-left: 20px;">
                <li>Que votre clé API est correcte</li>
                <li>Que la clé finit par <code>:fx</code></li>
                <li>Que vous avez vérifié votre email DeepL</li>
                <li>Que vous n'avez pas dépassé le quota (500k caractères/mois)</li>
              </ul>
            </div>
          </div>
        `
        console.error(error)
      }
    }

    async function testComparison() {
      const apiKey = getApiKey()
      if (!apiKey) return

      const text = document.getElementById('textToTranslate').value
      const result = document.getElementById('result')

      if (!text) {
        result.innerHTML = '<div class="error">Veuillez entrer un texte à traduire</div>'
        return
      }

      result.innerHTML = '<p>⏳ Comparaison en cours...</p>'

      try {
        // Traduire avec les deux services en parallèle
        const [deeplResult, libreResult] = await Promise.all([
          translateWithDeepL(text, apiKey).catch(err => `❌ Erreur: ${err.message}`),
          translateWithLibreTranslate(text).catch(err => `❌ Erreur: ${err.message}`)
        ])

        result.innerHTML = `
          <div class="success">✅ Comparaison terminée !</div>
          <div style="margin-top: 16px;">
            <div><strong>Original (EN) :</strong></div>
            <div style="margin: 8px 0; font-size: 18px;">${text}</div>
          </div>
          <div class="comparison">
            <div class="comparison-item">
              <h3>🏆 DeepL (Meilleure qualité)</h3>
              <div style="font-size: 16px; color: #3498db; font-weight: bold;">${deeplResult}</div>
            </div>
            <div class="comparison-item">
              <h3>🆓 LibreTranslate (Gratuit)</h3>
              <div style="font-size: 16px; color: #95a5a6;">${libreResult}</div>
            </div>
          </div>
        `
      } catch (error) {
        result.innerHTML = `<div class="error">❌ Erreur: ${error.message}</div>`
        console.error(error)
      }
    }

    function quickTest(text) {
      document.getElementById('textToTranslate').value = text
      testDeepL()
    }

    window.addEventListener('load', () => {
      console.log('%c🌐 Test DeepL API', 'font-size: 20px; font-weight: bold; color: #3498db;')
      console.log('Obtenez votre clé gratuite sur : https://www.deepl.com/pro-api')
    })
  </script>
</body>
</html>
