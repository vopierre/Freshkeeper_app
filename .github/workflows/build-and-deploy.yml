name: Build and deploy

# Permissions nécessaires pour publier sur GitHub Pages via l'action officielle
permissions:
  contents: read
  pages: write
  id-token: write

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install dev types required in CI
        run: npm i --no-save -D @types/node

      - name: Build (vite only — skip tsc -b to avoid CI-only tsc errors)
        run: npx vite build

      - name: Add .nojekyll to dist
        run: |
          mkdir -p dist
          touch dist/.nojekyll

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v1
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1
