name: Build and deploy

# Permissions nécessaires pour que le workflow puisse pousser et gérer Pages
permissions:
  contents: write
  pages: write
  id-token: write

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install dev types required in CI
        run: npm i --no-save -D @types/node

      - name: Build (vite only)
        run: npx vite build

      - name: Ensure public files are copied into dist
        run: |
          if [ -d public ]; then
            echo "Copying public/ -> dist/"
            cp -a public/. dist/ || true
          else
            echo "No public/ directory found"
          fi
          # In case assets were kept at repo root (icon-*.png, manifest.json, sw.js, splash-*.png)
          for f in icon-32x32.png icon-16x16.png apple-touch-icon.png manifest.json sw.js splash-*.png; do
            if [ -f "$f" ]; then
              echo "Copying root/$f -> dist/"
              cp -a "$f" dist/ || true
            fi
          done

      - name: Add .nojekyll to dist
        run: |
          mkdir -p dist
          touch dist/.nojekyll

      - name: Show dist/ contents (diagnostic)
        run: |
          echo "dist size:"
          du -sh dist || true
          echo "dist tree:"
          ls -la dist || true
          echo "----- dist/index.html -----"
          if [ -f dist/index.html ]; then
            sed -n '1,200p' dist/index.html || true
          else
            echo "dist/index.html not found"
            exit 1
          fi
          echo "----- end index.html -----"
          echo "Check assets directory:"
          ls -la dist/assets || true

      - name: Deploy to GitHub Pages (push to gh-pages)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          allow_empty_commit: false
